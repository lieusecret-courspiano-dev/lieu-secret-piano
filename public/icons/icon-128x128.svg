  <rect x="50" y="32" width="12" height="42" rx="3" fill="#f8f8f8"/>
  <rect x="66" y="32" width="12" height="42" rx="3" fill="#f8f8f8"/>
  <rect x="82" y="32" width="12" height="42" rx="3" fill="#f8f8f8"/>
  <!-- Touche noire centrale (dorée) -->
  <rect x="61" y="32" width="7" height="25" rx="2" fill="#f59e0b"/>
  <!-- Texte LS -->
